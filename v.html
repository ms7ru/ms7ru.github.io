<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meeting Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: url('./i.png') no-repeat center center fixed; 
            background-size: cover;
            color: white;
        }
        h1, p {
            margin: 0;
            text-align: center;
        }
        h1 {
            font-size: 3em;
            margin-bottom: 20px;
        }
        .bottom-text {
            position: absolute;
            bottom: 20px;
            font-size: 0.8em;
            text-align: center;
            width: 100%;
        }
        input {
            margin: 10px;
            padding: 8px;
            font-size: 1.2em;
            border-radius: 5px;
            border: none;
        }
        button {
            padding: 10px 20px;
            font-size: 1.2em;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
        }
        #form-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: rgba(0, 0, 0, 0.5); /* Black background with transparency */
            padding: 20px;
            border-radius: 10px;
        }
        #output {
            background-color: rgba(0, 0, 0, 0.5); /* Black background with transparency */
            padding: 20px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div id="form-container">
        <input type="text" id="villageName" placeholder="Enter village name" />
        <input type="text" id="meetingType" placeholder="Enter meeting type" />
        <button onclick="displayText()">Submit</button>
    </div>

    <div id="output" style="display:none;">
        <h1 id="meetingText"></h1>
        <div class="bottom-text">
            <p>background by Rhythm</p>
            <p>presented by 6th A</p>
        </div>
    </div>

    <script>
        function displayText() {
            // Get input values
            const village = document.getElementById('villageName').value;
            const meeting = document.getElementById('meetingType').value;

            // Construct the display text
            const meetingText = meeting + " Meeting of " + village + " Village";

            // Set the text in the webpage
            document.getElementById('meetingText').innerText = meetingText;

            // Hide the input form and show the output
            document.getElementById('form-container').style.display = 'none';
            document.getElementById('output').style.display = 'block';
        }
    </script>

</body>
</html>
